<!--
  Koykan – živi pregled v5
  v5: opis na svim taskovima (editabilno), projekti (A_ marker, žuto, prekidač + batch),
      povlači samo otvorene (gumb "Gotovi" učita i dovršene), paginirano.
-->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;450;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">

<style>
  :root{
    --bg:#13161b; --panel:#1a1e25; --panel2:#212732; --line:#2c3340;
    --text:#e8ebef; --muted:#98a1ac; --faint:#677081;
    --accent:#5aa6f0; --ok:#4fd089; --over:#ef6f6f; --soon:#f5c451; --proj:#f5c451;
    --display:'Space Grotesk',system-ui,sans-serif; --body:'Inter',system-ui,sans-serif; --mono:'IBM Plex Mono',ui-monospace,monospace;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--bg); color:var(--text); font-family:var(--body); -webkit-font-smoothing:antialiased}
  .wrap{padding:22px clamp(14px,3vw,30px) 60px; min-height:100vh}
  .top{display:flex; align-items:flex-end; justify-content:space-between; gap:18px; flex-wrap:wrap; margin-bottom:16px}
  .title{font-family:var(--display); font-weight:700; font-size:clamp(20px,3.2vw,28px); letter-spacing:-.02em}
  .title span{color:var(--faint); font-weight:500}
  .sub{color:var(--muted); font-size:12.5px; margin-top:4px}
  .prog{display:flex; align-items:center; gap:12px}
  .ring{position:relative; width:56px; height:56px} .ring svg{transform:rotate(-90deg)}
  .ring .pct{position:absolute; inset:0; display:flex; align-items:center; justify-content:center; font-family:var(--mono); font-size:13px}
  .meta{font-size:12px; color:var(--muted)} .meta b{color:var(--text); font-family:var(--mono); font-weight:500}

  .bar{display:flex; align-items:center; gap:8px; flex-wrap:wrap; margin-bottom:12px}
  .seg{display:inline-flex; border:1px solid var(--line); border-radius:8px; overflow:hidden}
  .seg button{font:500 12px/1 var(--body); color:var(--muted); background:var(--panel); border:none; border-right:1px solid var(--line); padding:8px 12px; cursor:pointer}
  .seg button:last-child{border-right:none} .seg button.on{background:var(--panel2); color:var(--text)}
  .btn{font:500 12.5px/1 var(--body); color:var(--muted); background:var(--panel); border:1px solid var(--line); border-radius:8px; padding:8px 12px; cursor:pointer; transition:.15s}
  .btn:hover{color:var(--text); border-color:#3a424f} .btn.on{color:var(--text); border-color:#3a424f}
  .btn.add{background:var(--accent); color:#0d1014; border-color:var(--accent); font-weight:600}
  .btn.proj{border-color:rgba(245,196,81,.4); color:#f3d68a}
  .chip{font:500 12px/1 var(--body); color:var(--muted); background:var(--panel); border:1px solid var(--line); border-radius:999px; padding:7px 11px; cursor:pointer; transition:.15s; display:inline-flex; gap:6px; align-items:center}
  .chip:hover{color:var(--text)} .chip[data-on="false"]{opacity:.4; text-decoration:line-through}
  .chip .c{font-family:var(--mono); font-size:10.5px; color:var(--faint)}
  .chip .cc{font-family:var(--mono); font-size:9.5px; padding:2px 6px; border-radius:999px; letter-spacing:.02em}
  .chip .cc.over{color:#f0a6a6; background:rgba(239,111,111,.14); border:1px solid rgba(239,111,111,.3)}
  .chip .cc.crit{color:#ffce85; background:rgba(255,180,60,.12); border:1px solid rgba(255,180,60,.32)}
  .spacer{flex:1 1 20px} .synced{font:400 11px/1 var(--mono); color:var(--faint)}
  .bgroup{display:flex; align-items:center; gap:8px; padding-left:14px; border-left:1px solid var(--line)}
  .bgroup.nb{padding-left:0; border-left:none}
  .glabel{font:600 9px/1 var(--mono); letter-spacing:.12em; text-transform:uppercase; color:var(--faint)}
  .glabel.g1{color:#7fb4f0} .glabel.g2{color:#f3d68a} .glabel.g3{color:#7fd6a8} .glabel.g4{color:#c9a6f0}
  .searchbox{background:var(--bg); border:1px solid var(--line); color:var(--text); border-radius:7px; padding:6px 9px; font-size:12px; width:170px}
  .searchbox:focus{outline:none; border-color:#3a424f}
  .searchbox::placeholder{color:var(--faint)}
  #win-seg button[data-w="overdue"].on{background:rgba(239,111,111,.16); color:#f3a0a0}
  .filters{display:flex; gap:8px; flex-wrap:wrap; margin-bottom:18px}

  .setup{background:var(--panel); border:1px solid var(--line); border-radius:12px; padding:18px; max-width:560px; margin:0 auto}
  .setup h2{font-family:var(--display); font-size:16px; margin-bottom:6px}
  .setup p{color:var(--muted); font-size:13px; margin-bottom:14px; line-height:1.5}
  .setup input{width:100%; background:var(--bg); border:1px solid var(--line); color:var(--text); border-radius:8px; padding:10px 12px; font-family:var(--mono); font-size:13px; margin-bottom:12px}
  .setup .btn{background:var(--accent); color:#0d1014; border-color:var(--accent); font-weight:600}

  .addform{background:var(--panel); border:1px solid var(--line); border-radius:12px; padding:14px; margin-bottom:16px; display:none; gap:10px; flex-wrap:wrap; align-items:flex-end}
  .addform.open{display:flex}
  .fld{display:flex; flex-direction:column; gap:4px}
  .fld label{font:500 10px/1 var(--mono); letter-spacing:.06em; color:var(--faint); text-transform:uppercase}
  .fld input, .fld select{background:var(--bg); border:1px solid var(--line); color:var(--text); border-radius:7px; padding:8px 10px; font-size:13px; color-scheme:dark}
  .fld.grow{flex:1; min-width:180px} .fld.grow input{width:100%}

  .grid{display:grid; grid-template-columns:repeat(auto-fill,minmax(340px,1fr)); gap:14px; align-items:start}
  .card{background:var(--panel); border:1px solid var(--line); border-radius:13px; overflow:hidden}
  .card.b-over{border-left:3px solid var(--over)} .card.b-today{border-left:3px solid var(--soon)} .card.cat-private{border-left:3px solid var(--over)}
  .card-h{display:flex; align-items:baseline; justify-content:space-between; gap:8px; padding:13px 15px; border-bottom:1px solid var(--line)}
  .gname{font-family:var(--display); font-weight:600; font-size:15px}
  .card.b-over .gname{color:#f0a6a6} .card.b-today .gname{color:#f3d68a} .card.cat-private .gname{color:#f0a6a6}
  .count{font-family:var(--mono); font-size:11px; color:var(--muted)}
  .list{padding:5px 8px 9px}
  .subhead{display:flex; align-items:center; gap:7px; padding:10px 8px 4px; font:500 10px/1 var(--mono); letter-spacing:.08em; text-transform:uppercase; color:var(--faint)}
  .subhead .sc{color:var(--muted)} .subhead.over{color:#f0a6a6} .subhead.today{color:#f3d68a}
  .kasni{font:500 10px/1 var(--mono); color:#f0a6a6; background:rgba(239,111,111,.14); border:1px solid rgba(239,111,111,.3); border-radius:999px; padding:3px 7px}
  .critb{font:500 10px/1 var(--mono); color:#ffce85; background:rgba(255,180,60,.12); border:1px solid rgba(255,180,60,.32); border-radius:999px; padding:3px 7px}

  .row{display:flex; align-items:flex-start; gap:10px; padding:9px 7px; border-radius:8px; cursor:pointer; transition:background .12s}
  .row:hover{background:var(--panel2)} .row[aria-busy="true"]{opacity:.5; pointer-events:none}
  .box{width:16px; height:16px; border-radius:5px; border:1.5px solid var(--line); flex:none; margin-top:1px; display:flex; align-items:center; justify-content:center; transition:.12s}
  .box svg{width:10px; height:10px; opacity:0}
  .row[data-done="true"] .box{background:var(--ok); border-color:var(--ok)} .row[data-done="true"] .box svg{opacity:1}
  .row[data-cat="private"] .box{border-color:rgba(239,111,111,.55)}
  .row[data-proj="true"] .box{border-color:rgba(245,196,81,.6)}
  .tbody{flex:1; min-width:0}
  .tt{font-size:13px; font-weight:450}
  .row[data-cat="private"] .tt{color:#f0a6a6}
  .row[data-proj="true"] .tt{color:#f3d68a}
  .row[data-proj="true"] .tt::before{content:'▰ '; color:var(--proj); font-size:9px}
  .row[data-done="true"] .tt{text-decoration:line-through; color:var(--faint)}

  .next{display:flex; gap:7px; align-items:center; margin-top:5px; flex-wrap:wrap}
  .next .nlabel{font:500 9px/1 var(--mono); letter-spacing:.1em; color:var(--faint); border:1px solid var(--line); border-radius:4px; padding:3px 5px; flex:none; cursor:pointer}
  .next .ndate{font-family:var(--mono); font-size:11px; color:var(--muted); flex:none; cursor:pointer}
  .next .ndate.over{color:#f3a0a0} .next .ndate.soon{color:#f3d68a}
  .next .ntext{font-size:12px; color:var(--text); cursor:pointer} .next.empty .ntext{color:var(--faint)}
  .nudges{display:inline-flex; gap:4px; opacity:0; transition:.12s} .row:hover .nudges{opacity:1}
  .nudge{font:500 9.5px/1 var(--mono); color:var(--faint); background:transparent; border:1px solid var(--line); border-radius:4px; padding:3px 5px; cursor:pointer}
  .nudge:hover{color:var(--text); border-color:#3a424f}
  .rnudges{display:inline-flex; gap:4px; opacity:0; transition:.12s} .row:hover .rnudges{opacity:1}

  .tags{display:flex; gap:6px; align-items:center; margin-top:5px; flex-wrap:wrap}
  .rok{font-family:var(--mono); font-size:10.5px; padding:2px 6px; border-radius:5px; background:var(--panel2); color:var(--muted); border:1px solid var(--line); cursor:pointer}
  .rok.over{background:rgba(239,111,111,.14); color:#f3a0a0; border-color:rgba(239,111,111,.3)}
  .rok.soon{background:rgba(245,196,81,.14); color:#f3d68a; border-color:rgba(245,196,81,.3)}
  .ochip{font:500 10px/1 var(--body); color:var(--muted); background:var(--panel2); border:1px solid var(--line); border-radius:999px; padding:3px 8px}
  .ochip.priv{color:#f0a6a6; border-color:rgba(239,111,111,.3)}
  .pill{font:500 10px/1 var(--mono); color:var(--faint); border:1px solid var(--line); border-radius:5px; padding:3px 6px; cursor:pointer}
  .pill:hover{color:var(--text)} .pill.open{color:var(--text); border-color:#3a424f}
  .pill.proj-on{color:#f3d68a; border-color:rgba(245,196,81,.4)}
  .pill.crit-on{color:#f0a6a6; border-color:rgba(239,111,111,.5); background:rgba(239,111,111,.12)}
  .pill.uredi-pill{font-size:11px; font-weight:700; color:var(--accent); border-color:rgba(90,166,240,.55); background:rgba(90,166,240,.14); padding:4px 11px; letter-spacing:.03em; text-transform:uppercase}
  .pill.uredi-pill:hover{color:#fff; border-color:var(--accent); background:rgba(90,166,240,.28)}
  .row[data-proj="true"] .pill.uredi-pill{font-size:12px; padding:5px 13px}
  .pill.link-pill{color:#7ee0b0; border-color:rgba(90,209,154,.55); background:rgba(90,209,154,.14); text-decoration:none; font-weight:700}
  .pill.link-pill:hover{color:#fff; border-color:#5ad19a; background:rgba(90,209,154,.3)}
  .row[data-proj="true"] .pill.link-pill{font-size:11px; padding:4px 11px}
  .row[data-crit="true"]{box-shadow:inset 3px 0 0 #ef6f6f}
  .row[data-crit="true"] .tt::after{content:' ●'; color:#ef6f6f; font-size:9px; vertical-align:middle}

  .notes{margin-top:7px; padding:8px 10px; background:var(--bg); border:1px solid var(--line); border-radius:7px; font-size:12px; color:var(--muted); line-height:1.55}
  .nline{white-space:pre-wrap; word-break:break-word}
  .nlink{color:var(--accent); text-decoration:none; font-family:var(--mono); font-size:11px} .nlink:hover{text-decoration:underline}
  .notes .nedit{margin-top:8px; display:flex; gap:8px; align-items:flex-end; flex-wrap:wrap}
  .notes textarea{flex:1; min-width:200px; min-height:70px; background:var(--panel); border:1px solid var(--line); color:var(--text); border-radius:6px; padding:8px; font:400 12px/1.5 var(--body); resize:vertical}
  .notes .nbtns{display:flex; gap:6px}
  .mini{font:500 10px/1 var(--mono); border-radius:5px; padding:5px 8px; cursor:pointer}
  .mini.save{background:var(--accent); color:#0d1014; border:none} .mini.cancel{background:transparent; color:var(--muted); border:1px solid var(--line)}
  .mini.edit{background:transparent; color:var(--faint); border:1px solid var(--line); margin-top:6px; display:inline-block}

  .editor{margin-top:7px; padding:10px; background:var(--bg); border:1px solid var(--line); border-radius:7px; display:flex; gap:8px; flex-wrap:wrap; align-items:flex-end}
  .editor .efld{display:flex; flex-direction:column; gap:4px} .editor .efld.grow{flex:1; min-width:150px}
  .editor label{font:500 9px/1 var(--mono); letter-spacing:.06em; color:var(--faint); text-transform:uppercase}
  .editor input[type=text]{background:var(--panel); border:1px solid var(--line); color:var(--text); border-radius:6px; padding:7px 9px; font-size:12.5px; width:100%}
  .editor input[type=date]{background:var(--panel); border:1px solid var(--line); color:var(--text); border-radius:6px; padding:6px 8px; font-family:var(--mono); font-size:12px; color-scheme:dark}
  .editor .save{background:var(--accent); color:#0d1014; border:none; border-radius:6px; padding:8px 12px; font:600 12px/1 var(--body); cursor:pointer}
  .editor .cancel{background:transparent; color:var(--muted); border:1px solid var(--line); border-radius:6px; padding:8px 12px; font:500 12px/1 var(--body); cursor:pointer}

  .priv-btn{flex:none; align-self:flex-start; margin-top:1px; font:500 10px/1 var(--mono); color:var(--faint); background:transparent; border:1px solid var(--line); border-radius:5px; padding:4px 7px; cursor:pointer; opacity:0; transition:.12s; white-space:nowrap}
  .row:hover .priv-btn{opacity:1} .priv-btn:hover{color:var(--text); border-color:#3a424f}

  .selbox{width:16px;height:16px;border-radius:4px;border:1.5px solid var(--line);flex:none;margin-top:1px;display:none;align-items:center;justify-content:center;cursor:pointer}
  .selecting .selbox{display:flex}
  .selbox[data-sel="1"]{background:var(--accent);border-color:var(--accent)}
  .selbox[data-sel="1"]::after{content:'';width:8px;height:8px;border-radius:2px;background:#0d1014}
  .selall{font:500 9px/1 var(--mono);color:var(--accent);border:1px solid rgba(90,166,240,.4);border-radius:4px;padding:3px 6px;cursor:pointer;text-transform:none;letter-spacing:0}
  .selall:hover{color:#cfe3fb}
  .bulkbar{position:fixed;left:50%;transform:translateX(-50%);bottom:16px;z-index:50;background:var(--panel2);border:1px solid var(--line);border-radius:12px;box-shadow:0 10px 34px rgba(0,0,0,.45);padding:10px 12px;display:none;gap:10px;align-items:center;flex-wrap:wrap;max-width:calc(100vw - 28px)}
  .bulkbar.show{display:flex}
  .bulkbar .bsec{display:flex;gap:5px;align-items:center;border-left:1px solid var(--line);padding-left:10px}
  .bulkbar .bsec.first{border-left:none;padding-left:0}
  .bulkbar .blabel{font:500 9px/1 var(--mono);letter-spacing:.06em;color:var(--faint);text-transform:uppercase}
  .bulkbar input[type=text]{background:var(--bg);border:1px solid var(--line);color:var(--text);border-radius:6px;padding:6px 8px;font-size:12px;width:140px}
  .bulkbar input[type=date]{background:var(--bg);border:1px solid var(--line);color:var(--text);border-radius:6px;padding:5px 7px;font-family:var(--mono);font-size:11px;color-scheme:dark}
  .bulkbar button{font:500 10px/1 var(--mono);color:var(--muted);background:var(--panel);border:1px solid var(--line);border-radius:5px;padding:6px 8px;cursor:pointer}
  .bulkbar button:hover{color:var(--text);border-color:#3a424f}
  .bulkbar .bset{background:var(--accent);color:#0d1014;border-color:var(--accent)}
  .bulkbar .bcount{font:600 12px/1 var(--body);color:var(--text)} .bulkbar .bcount b{font-family:var(--mono)}
  .banner{background:rgba(239,111,111,.12); border:1px solid rgba(239,111,111,.3); color:#f3a0a0; border-radius:10px; padding:11px 14px; font-size:13px; margin-bottom:16px; display:none}
  .loading{color:var(--faint); text-align:center; padding:40px; font-size:13px}
  /* Tablica edit modal */
  .ge-overlay{position:fixed;inset:0;z-index:80;background:rgba(6,8,11,.72);display:none;align-items:flex-start;justify-content:center;padding:28px 16px}
  .ge-overlay.open{display:flex}
  .ge{background:var(--panel);border:1px solid var(--line);border-radius:14px;box-shadow:0 18px 60px rgba(0,0,0,.55);width:min(1180px,100%);max-height:calc(100vh - 56px);display:flex;flex-direction:column;overflow:hidden}
  .ge-head{display:flex;align-items:center;gap:12px;padding:14px 16px;border-bottom:1px solid var(--line);flex-wrap:wrap}
  .ge-head b{font:600 15px/1 var(--body);color:var(--text)}
  .ge-head .ge-sub{font:500 11px/1 var(--mono);color:var(--faint);letter-spacing:.04em}
  .ge-head .spacer{flex:1}
  .ge-dirty{font:600 11px/1 var(--mono);color:var(--accent)}
  .ge-body{overflow:auto;padding:0}
  table.ge-table{border-collapse:collapse;width:100%;font-size:12px}
  .ge-table thead th{position:sticky;top:0;z-index:2;background:var(--panel2);color:var(--faint);font:600 10px/1 var(--mono);letter-spacing:.06em;text-transform:uppercase;text-align:left;padding:9px 10px;border-bottom:1px solid var(--line);white-space:nowrap}
  .ge-table td{padding:6px 10px;border-bottom:1px solid var(--line);vertical-align:middle}
  .ge-table tr.dirty td{background:rgba(122,162,247,.07)}
  .ge-table tr.crit .ge-name{border-left:2px solid var(--bad);padding-left:8px}
  .ge-who{font:600 11px/1 var(--mono);color:var(--muted);white-space:nowrap}
  .ge-name{color:var(--text);max-width:340px;min-width:200px}
  .ge-name .pj{font-family:var(--mono);color:var(--proj);font-size:11px;margin-right:4px}
  .ge-name .cd{color:var(--bad);margin-right:4px}
  .ge-table input[type=text]{width:100%;min-width:200px;background:var(--bg);border:1px solid var(--line);color:var(--text);border-radius:6px;padding:6px 8px;font-size:12px}
  .ge-table input[type=date]{background:var(--bg);border:1px solid var(--line);color:var(--text);border-radius:6px;padding:5px 7px;font-family:var(--mono);font-size:11px;color-scheme:dark;width:140px}
  .ge-table input.over{border-color:rgba(239,111,111,.6)}
  .ge-table select{background:var(--bg);border:1px solid var(--line);color:var(--text);border-radius:6px;padding:5px 7px;font-size:11px;color-scheme:dark}
  .editor select{background:var(--bg);border:1px solid var(--line);color:var(--text);border-radius:6px;padding:6px 8px;font-size:12px;color-scheme:dark}
  .ge-empty{padding:40px;text-align:center;color:var(--faint);font-size:13px}
  @media (max-width:600px){ .grid{grid-template-columns:1fr} .priv-btn,.nudges{opacity:1} }
</style>

<div class="wrap">
  <div class="top">
    <div><div class="title">Koykan <span>/ taskovi (live)</span></div><div class="sub" id="sub">Spojeno na Google Tasks</div></div>
    <div class="prog" id="prog" style="display:none">
      <div class="ring"><svg width="56" height="56"><circle cx="28" cy="28" r="23" fill="none" stroke="var(--line)" stroke-width="5"></circle>
        <circle id="ring-fg" cx="28" cy="28" r="23" fill="none" stroke="var(--ok)" stroke-width="5" stroke-linecap="round" stroke-dasharray="144.5" stroke-dashoffset="144.5"></circle></svg><div class="pct" id="pct">0%</div></div>
      <div class="meta"><b id="open-n">0</b> otvoreno</div>
    </div>
  </div>

  <div id="banner" class="banner"></div>

  <div id="setup" class="setup" style="display:none">
    <h2>Unesi SECRET</h2>
    <p>String iz Apps Script koda. Sprema se samo lokalno, šalje se jedino na tvoj endpoint.</p>
    <input id="secret-in" type="password" placeholder="SECRET" autocomplete="off">
    <button class="btn" id="secret-save">Spremi i učitaj</button>
  </div>

  <div class="bar" id="bar" style="display:none">
    <div class="bgroup nb">
      <button class="btn add" id="new-task">+ Novi task</button>
    </div>
    <div class="bgroup">
      <span class="glabel g1">Grupiraj</span>
      <div class="seg" id="group-seg">
        <button data-g="owner_next" class="on">Osoba ▸ next</button>
        <button data-g="owner_due">Osoba ▸ rok</button>
        <button data-g="next">Po next stepu</button>
        <button data-g="due">Po roku</button>
        <button data-g="owner">Po nositelju</button>
      </div>
    </div>
    <div class="bgroup">
      <span class="glabel g2">Tip</span>
      <div class="seg" id="type-seg">
        <button data-t="all" class="on">Sve</button>
        <button data-t="project">Projekti</button>
        <button data-t="task">Taskovi</button>
        <button data-t="critical">Critical</button>
      </div>
    </div>
    <div class="bgroup">

<script>
(function(){
  var ENDPOINT='https://script.google.com/macros/s/AKfycbx1Os-anJAW2zKucLDnDdQWUBRUjlT-gnlf2t2MFCC-a0f2M9tpe8-7d1BDbEx01HubMA/exec';
  var LIST_ID='MTU0MjYyMDg5MDk1MzIxNjI3Njg6MDow';

  // poznati projekti (distinktivni dijelovi naziva) za batch "Označi projekte"
  var PROJECT_HINTS=['emergency repairs','cc stock management','equipment maintenance','model reccuring administracije','ambalaza kina','ambalaža kina','gastro-tim','tkalca - action','tkalča - action','kineska piletina','kcc sourcing','mkga','michel) projects','loyalty program','bubble tea - sales','bubble tea – sales','zabica - sales','žabica – sales','sops','controlling model','shift manager model','exp - pep','exp - zabica','exp - žabica','tkalca - franchise','tkalča - franchise','stock management (hr)','stranci a1','hr arhiva'];

  var memSecret='';
  function getSecret(){ try{return localStorage.getItem('koykan_secret')||'';}catch(e){return memSecret;} }
  function setSecret(v){ memSecret=v; try{localStorage.setItem('koykan_secret',v);}catch(e){} }
  function clearSecret(){ memSecret=''; try{localStorage.removeItem('koykan_secret');}catch(e){} }

  var MAP={'Dom':'Dom','AnaT':'Ana Trusk','Silva':'Silva','Ankica':'Ankica','Nataša':'Nataša','Natasa':'Nataša','Nino':'Nino','Michel':'Michel','Private':'Private'};
  var OWNER_ORDER=['Dom','Ana Trusk','Silva','Ankica','Nataša','Nino','Michel','Private'];
  var ADD_PREFIXES=['Dom','AnaT','Silva','Ankica','Nataša','Nino','Michel','Private'];
  var OWNER_PREFIXES=['Dom','AnaT','Silva','Ankica','Nataša','Nino','Michel','Stefan','Dav','Private'];
  function ownerOpts(cur){ var arr=OWNER_PREFIXES.slice(); if(cur && arr.indexOf(cur)<0) arr.unshift(cur); return arr.map(function(px){ return '<option value="'+px+'"'+(px===cur?' selected':'')+'>'+escapeHtml(MAP[px]||px)+'</option>'; }).join(''); }
  var PREFIX={'Private':'Private','Dom':'Dom'};
  function ownerOf(title){ var m=title.match(/^\(([^)]+)\)\s*/);
    if(m){ var raw=m[1].trim(); return {prefix:raw, owner:MAP[raw]||raw, clean:title.slice(m[0].length).trim()}; }
    return {prefix:'', owner:'Bez oznake', clean:title}; }
  function stripProj(clean){ var m=clean.match(/^A_\s?/); return {isProject:!!m, title: m? clean.slice(m[0].length):clean}; }
  function makeTitle(prefix,clean,isProject){ var body=(isProject?'A_ ':'')+clean; return prefix? '('+prefix+') '+body : body; }
  function norm(s){ return s.toLowerCase().replace(/[–—]/g,'-').replace(/\s+/g,' ').trim(); }

  function today0(){ var t=new Date(); t.setHours(0,0,0,0); return t; }
  function fmtShort(d){ return d.getDate()+'.'+(d.getMonth()+1)+'.'; }
  function fmtFull(d){ return d.getDate()+'.'+(d.getMonth()+1)+'.'+d.getFullYear()+'.'; }
  function fmtRok(d){ return ('0'+d.getDate()).slice(-2)+'.'+('0'+(d.getMonth()+1)).slice(-2)+'.'; }
  function dateInputVal(d){ return d? d.getFullYear()+'-'+('0'+(d.getMonth()+1)).slice(-2)+'-'+('0'+d.getDate()).slice(-2):''; }
  function fromInput(v){ return v? new Date(v+'T00:00:00'):null; }
  function toISODate(d){ return d? new Date(Date.UTC(d.getFullYear(),d.getMonth(),d.getDate(),0,0,0)).toISOString():''; }
  function whenClass(d,done){ if(!d||done) return ''; var t=today0(); var x=new Date(d); x.setHours(0,0,0,0); if(x<t) return 'over'; if(x.getTime()===t.getTime()) return 'soon'; return ''; }
  function bucket(d){ if(!d) return 'Bez datuma'; var t=today0(); var x=new Date(d); x.setHours(0,0,0,0);
    if(x<t) return 'Prekoračeno'; if(x.getTime()===t.getTime()) return 'Danas';
    var day=(t.getDay()+6)%7; var sun=new Date(t); sun.setDate(t.getDate()+(6-day)); sun.setHours(0,0,0,0);
    if(x<=sun) return 'Ovaj tjedan';
    var nsun=new Date(sun); nsun.setDate(sun.getDate()+7);
    if(x<=nsun) return 'Sljedeći tjedan';
    return 'Kasnije'; }
  var BUCKET_ORDER=['Prekoračeno','Danas','Ovaj tjedan','Sljedeći tjedan','Kasnije','Bez datuma','Bez next stepa'];

  function parseNext(notes){
    if(!notes) return {date:null,text:'',rest:'',critical:false,link:''};
    var lines=notes.split('\n'); var critical=false; var link='';
    lines=lines.filter(function(l){ if(/^\s*CRITICAL\s*$/i.test(l)){ critical=true; return false; } if(/^\s*LINK\s*:/i.test(l)){ link=l.replace(/^\s*LINK\s*:\s*/i,'').trim(); return false; } return true; });
    var idx=-1;
    for(var i=0;i<lines.length;i++){ if(/next\s*step/i.test(lines[i])){ idx=i; break; } }
    if(idx<0) return {date:null,text:'',rest:lines.join('\n').replace(/^\n+/,''),critical:critical,link:link};
    var line=lines[idx]; var dm=line.match(/(\d{1,2})\.(\d{1,2})\.(\d{4})/);
    var date=dm? new Date(parseInt(dm[3],10),parseInt(dm[2],10)-1,parseInt(dm[1],10)):null;
    var text=line.replace(/next\s*step\s*:?/i,'').replace(/(\d{1,2})\.(\d{1,2})\.(\d{4})\.?/,'').replace(/^\s*[-–—|:]+\s*/,'').replace(/\s*[-–—|:]+\s*$/,'').trim();
    var rest=lines.filter(function(_,i){return i!==idx;}).join('\n').replace(/^\n+/,'');
    return {date:date,text:text,rest:rest,critical:critical,link:link};
  }
  function buildNotes(text,date,rest,critical,link){ var out=[]; if(critical) out.push('CRITICAL'); var has=(text||date); if(has) out.push('NEXT STEP: '+(text||'')+(date?' - '+fmtFull(date):'')); if(link) out.push('LINK: '+link); if(rest) out.push(rest); return out.join('\n'); }

  function api(params){ params.secret=getSecret(); params.listId=LIST_ID;
    var qs=Object.keys(params).map(function(k){return encodeURIComponent(k)+'='+encodeURIComponent(params[k]);}).join('&');
    return fetch(ENDPOINT+'?'+qs,{method:'GET'}).then(function(r){return r.json();}); }

  var TASKS=[], RAW=[], ownerOn={}, groupMode='owner_next', loadCompleted=false, typeFilter='all', winFilter='all', searchQ='', selectMode=false, selected={};
  var el=function(id){return document.getElementById(id);};
  function banner(m){ var b=el('banner'); if(!m){b.style.display='none';return;} b.textContent=m; b.style.display='block'; }
  function escapeHtml(s){ return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

  function load(){
    banner(''); el('loading').style.display='block'; el('grid').innerHTML='';
    var params={action:'tasks'}; if(loadCompleted) params.all='true';
    api(params).then(function(res){
      el('loading').style.display='none';
      if(!res||res.error){ banner('Greška: '+((res&&res.error)||'nema odgovora')); if(res&&res.error==='unauthorized'){clearSecret();showSetup();} return; }
      RAW=res.tasks||[];
      TASKS=(res.tasks||[]).map(function(t){ var o=ownerOf(t.title); var pj=stripProj(o.clean); var n=parseNext(t.notes||'');
        return { id:t.id, prefix:o.prefix, owner:o.owner, title:pj.title, isProject:pj.isProject, status:t.status, done:t.status==='completed',
                 due:t.due?new Date(t.due):null, notes:t.notes||'', nextDate:n.date, nextText:n.text, rest:n.rest, critical:n.critical, link:n.link }; });
      buildOwnerFilters(); render();
      el('bar').style.display='flex'; el('prog').style.display='flex';
      el('synced').textContent='sync '+new Date().toLocaleTimeString();
    }).catch(function(err){ el('loading').style.display='none'; banner('Ne mogu dohvatiti endpoint ('+err+').'); });
  }

  function buildOwnerFilters(){
    var owners=[]; TASKS.forEach(function(t){ if(owners.indexOf(t.owner)<0) owners.push(t.owner); }); owners.sort(byOwner);
    owners.forEach(function(o){ if(ownerOn[o]===undefined) ownerOn[o]=true; });
    var box=el('owner-filters'); box.innerHTML=''; box.style.display='flex';
    owners.forEach(function(o){ var open=TASKS.filter(function(t){return t.owner===o && !t.done;});
      var n=open.length;
      var over=open.filter(isOverdue).length;
      var crit=open.filter(function(t){return t.critical;}).length;
      var extra=''; if(over) extra+=' <span class="cc over">'+over+' kasni</span>'; if(crit) extra+=' <span class="cc crit">'+crit+' crit</span>';
      var c=document.createElement('div'); c.className='chip'; c.dataset.on=ownerOn[o]; c.innerHTML=o+' <span class="c">'+n+'</span>'+extra;
      c.addEventListener('click',function(){
        var onCount=0; owners.forEach(function(x){ if(ownerOn[x]) onCount++; });
        if(ownerOn[o] && onCount===1){ owners.forEach(function(x){ ownerOn[x]=true; }); }
        else { owners.forEach(function(x){ ownerOn[x]=(x===o); }); }
        buildOwnerFilters(); render();
      }); box.appendChild(c); });
  }
  function byOwner(a,b){ var ia=OWNER_ORDER.indexOf(a),ib=OWNER_ORDER.indexOf(b); if(ia<0)ia=99; if(ib<0)ib=99; return ia-ib||a.localeCompare(b); }
  function weekRange(off){ var t=today0(); var day=(t.getDay()+6)%7; var mon=new Date(t); mon.setDate(t.getDate()-day+off*7); mon.setHours(0,0,0,0); var sun=new Date(mon); sun.setDate(mon.getDate()+6); sun.setHours(23,59,59,999); return {from:mon,to:sun}; }
  function winRange(){ if(winFilter==='today'){ var t=today0(); var e=new Date(t); e.setHours(23,59,59,999); return {from:t,to:e}; } if(winFilter==='this') return weekRange(0); if(winFilter==='next') return weekRange(1); return null; }
  function inWin(t){ if(winFilter==='all') return true; var ds=[]; if(t.nextDate) ds.push(new Date(t.nextDate)); if(t.due) ds.push(new Date(t.due)); if(!ds.length) return false;
    if(winFilter==='overdue'){ var t0=today0(); return ds.some(function(d){ var x=new Date(d); x.setHours(0,0,0,0); return x<t0; }); }
    if(winFilter==='today'){ var e=today0(); e.setHours(23,59,59,999); return ds.some(function(d){ return d<=e; }); }
    if(winFilter==='this'){ var rt=weekRange(0); return ds.some(function(d){ return d<=rt.to; }); }
    if(winFilter==='next'){ var rn=weekRange(1); return ds.some(function(d){ return d>=rn.from && d<=rn.to; }); }
    return true; }
  function visibleTasks(){ return TASKS.filter(function(t){ if(!ownerOn[t.owner]) return false; if(typeFilter==='project'&&!t.isProject) return false; if(typeFilter==='task'&&t.isProject) return false; if(typeFilter==='critical'&&!t.critical) return false; if(searchQ && norm(t.title).indexOf(searchQ)<0) return false; if(!inWin(t)) return false; return true; }); }
  function isOverdue(t){ if(t.done) return false; var t0=today0().getTime(); var ds=[]; if(t.due) ds.push(t.due); if(t.nextDate) ds.push(t.nextDate); return ds.some(function(d){ var x=new Date(d); x.setHours(0,0,0,0); return x.getTime()<t0; }); }

  function render(){
    var grid=el('grid'); grid.innerHTML='';
    var items=visibleTasks();
    if(groupMode==='owner_next'){ renderOwnerNested(grid, items, 'nextDate'); updateProg(); return; }
    if(groupMode==='owner_due'){ renderOwnerNested(grid, items, 'due'); updateProg(); return; }
    var groups={};
    items.forEach(function(t){ var key; if(groupMode==='owner') key=t.owner; else if(groupMode==='due') key=bucket(t.due); else key=t.nextDate?bucket(t.nextDate):'Bez next stepa'; (groups[key]=groups[key]||[]).push(t); });
    var keys=Object.keys(groups);
    if(groupMode==='owner') keys.sort(byOwner); else keys.sort(function(a,b){ var ia=BUCKET_ORDER.indexOf(a),ib=BUCKET_ORDER.indexOf(b); if(ia<0)ia=98; if(ib<0)ib=98; return ia-ib; });
    keys.forEach(function(k){ var arr=groups[k]; arr.sort(function(a,b){ if(a.done!==b.done) return a.done?1:-1; if(a.critical!==b.critical) return a.critical?-1:1; if(a.isProject!==b.isProject) return a.isProject?-1:1; return sortDate(a)-sortDate(b); });
      var card=document.createElement('div'); card.className='card';
      if(groupMode!=='owner'){ if(k==='Prekoračeno') card.className+=' b-over'; else if(k==='Danas') card.className+=' b-today'; } else if(k==='Private') card.className+=' cat-private';
      var doneN=arr.filter(function(t){return t.done;}).length;
      var badges='';
      if(groupMode==='owner'){ var oN=arr.filter(isOverdue).length, cN=arr.filter(function(t){return !t.done&&t.critical;}).length; if(cN) badges+='<span class="critb">'+cN+' crit</span>'; if(oN) badges+='<span class="kasni">kasni '+oN+'</span>'; }
      card.innerHTML='<div class="card-h"><div class="gname">'+k+'</div><div style="display:flex;gap:8px;align-items:center">'+badges+'<div class="count">'+(loadCompleted?doneN+'/'+arr.length:arr.length)+'</div></div></div>';
      var list=document.createElement('div'); list.className='list'; arr.forEach(function(t){ list.appendChild(rowEl(t)); }); card.appendChild(list); grid.appendChild(card); });
    updateProg();
  }
  function renderOwnerNested(grid, items, field){
    var emptyLbl = field==='due' ? 'Bez roka' : 'Bez next stepa';
    var owners=[]; items.forEach(function(t){ if(owners.indexOf(t.owner)<0) owners.push(t.owner); }); owners.sort(byOwner); var t0=today0().getTime();
    owners.forEach(function(o){ var arr=items.filter(function(t){return t.owner===o;});
      var card=document.createElement('div'); card.className='card'+(o==='Private'?' cat-private':'');
      var doneN=arr.filter(function(t){return t.done;}).length;
      var overN=arr.filter(isOverdue).length;
      var critN=arr.filter(function(t){return !t.done && t.critical;}).length;
      var kasni=overN>0? '<span class="kasni">kasni '+overN+'</span>':'';
      var critb=critN>0? '<span class="critb">'+critN+' crit</span>':'';
      var saO=selectMode?'<span class="selall" data-sa="o">sve</span>':'';
      card.innerHTML='<div class="card-h"><div class="gname">'+o+'</div><div style="display:flex;gap:8px;align-items:center">'+saO+critb+kasni+'<div class="count">'+(loadCompleted?doneN+'/'+arr.length:arr.length)+'</div></div></div>';
      if(selectMode){ var sao=card.querySelector('[data-sa="o"]'); if(sao) sao.addEventListener('click',function(e){ e.stopPropagation(); selectGroup(arr); }); }
      var list=document.createElement('div'); list.className='list';
      var subs={}; arr.forEach(function(t){ var k=t[field]?bucket(t[field]):emptyLbl; (subs[k]=subs[k]||[]).push(t); });
      var ORDER2=['Prekoračeno','Danas','Ovaj tjedan','Sljedeći tjedan','Kasnije','Bez datuma',emptyLbl];
      var bk=Object.keys(subs).sort(function(a,b){ var ia=ORDER2.indexOf(a),ib=ORDER2.indexOf(b); if(ia<0)ia=98; if(ib<0)ib=98; return ia-ib; });
      bk.forEach(function(k){ var sarr=subs[k]; sarr.sort(function(a,b){ if(a.done!==b.done) return a.done?1:-1; if(a.critical!==b.critical) return a.critical?-1:1; if(a.isProject!==b.isProject) return a.isProject?-1:1; var da=a[field]?new Date(a[field]).getTime():Infinity, db=b[field]?new Date(b[field]).getTime():Infinity; return da-db; });
        var sh=document.createElement('div'); sh.className='subhead'+(k==='Prekoračeno'?' over':(k==='Danas'?' today':'')); sh.innerHTML=k+' <span class="sc">'+sarr.length+'</span>'+(selectMode?' <span class="selall" data-sa="g">sve</span>':''); list.appendChild(sh);
        if(selectMode){ var sag=sh.querySelector('[data-sa="g"]'); if(sag) sag.addEventListener('click',function(e){ e.stopPropagation(); selectGroup(sarr); }); }
        sarr.forEach(function(t){ list.appendChild(rowEl(t)); }); });
      card.appendChild(list); grid.appendChild(card); });
  }
  function sortDate(t){ var d=(groupMode==='due')? t.due : (groupMode==='owner'? (t.nextDate||t.due) : t.nextDate); return d? new Date(d).getTime():Infinity; }

  function rowEl(t){
    var row=document.createElement('div'); row.className='row'; row.dataset.done=t.done; row.dataset.id=t.id;
    row.dataset.cat=(t.owner==='Private')?'private':''; row.dataset.proj=t.isProject?'true':'false'; row.dataset.crit=t.critical?'true':'false';
    var toPriv=(t.owner!=='Private'); var btnLbl=toPriv?'→ Private':'→ Dom';
    var nextInner=(t.nextDate?'<span class="ndate '+whenClass(t.nextDate,t.done)+'">'+fmtShort(t.nextDate)+'</span>':'')+'<span class="ntext">'+(t.nextText?escapeHtml(t.nextText):'+ dodaj next step')+'</span>';
    var nudges='<span class="nudges"><button class="nudge" data-n="md">-1d</button><button class="nudge" data-n="today">danas</button><button class="nudge" data-n="d">+1d</button><button class="nudge" data-n="w">+1tj</button></span>';
    var nextHtml='<div class="next'+((t.nextDate||t.nextText)?'':' empty')+'"><span class="nlabel">NEXT</span>'+nextInner+nudges+'</div>';
    var rok=t.due?'<span class="rok '+whenClass(t.due,t.done)+'">rok '+fmtRok(t.due)+'</span>':'<span class="rok">+ rok</span>';
    var rnudges='<span class="rnudges"><button class="nudge" data-rn="md">-1d</button><button class="nudge" data-rn="today">danas</button><button class="nudge" data-rn="d">+1d</button><button class="nudge" data-rn="w">+1tj</button></span>';
    var ochip=(groupMode==='due'||groupMode==='next')?'<span class="ochip'+(t.owner==='Private'?' priv':'')+'">'+t.owner+'</span>':'';
    var opis='<span class="pill opis-pill">opis</span>';
    var uredi='<span class="pill uredi-pill">uredi</span>';
    var projp='<span class="pill projekt-pill'+(t.isProject?' proj-on':'')+'">'+(t.isProject?'projekt ✓':'projekt')+'</span>';
    var critp='<span class="pill crit-pill'+(t.critical?' crit-on':'')+'">'+(t.critical?'critical ✓':'critical')+'</span>';
    var lhref=t.link||''; if(lhref && !/^https?:\/\//i.test(lhref)) lhref='https://'+lhref;
    var linkp=t.link?'<a class="pill link-pill" href="'+escapeAttr(lhref)+'" target="_blank" rel="noopener">↗ otvori</a>':'';
    row.innerHTML='<span class="selbox"></span><span class="box"><svg viewBox="0 0 12 12"><path d="M2.5 6.2 5 8.6l4.4-5" fill="none" stroke="#0d1014" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg></span>'+
      '<span class="tbody"><span class="tt">'+escapeHtml(t.title)+'</span>'+nextHtml+'<span class="tags">'+rok+rnudges+ochip+opis+uredi+projp+critp+linkp+'</span></span>'+
      '<button class="priv-btn">'+btnLbl+'</button>';
    var tbody=row.querySelector('.tbody');

  function saveTask(t,row,naziv,dueDate,nextText,nextDate,newPrefix,newLink){

      banner(''); t.title=naziv; t.prefix=px; t.owner=MAP[px]||px; if(dueDate) t.due=dueDate; t.nextText=nextText; t.nextDate=nextDate; t.notes=notes; if(ownerChanged) buildOwnerFilters(); render();

  function nudge(t,row,kind){

    var notes=buildNotes(t.nextText, base, t.rest,t.critical,t.link);
    busy(row,true); api({action:'update', taskId:t.id, notes:notes}).then(function(res){ busy(row,false); if(!res||res.error){ banner('Ne mogu pomaknuti: '+((res&&res.error)||'?')); return; }

  function bulkRun(perTask,label){ var arr=selectedTasks(); if(!arr.length){ banner('Ništa nije označeno.'); return; } var i=0,ok=0; banner(label+'...');
    (function step(){ if(i>=arr.length){ banner(label+' gotovo: '+ok+'/'+arr.length); render(); updateBulkBar(); return; }
      var t=arr[i++]; var spec=perTask(t); if(!spec){ step(); return; } var params={action:'update',taskId:t.id}; for(var k in spec.params) params[k]=spec.params[k];
      api(params).then(function(res){ if(res&&!res.error){ ok++; spec.commit(); } step(); }).catch(function(){ step(); }); })(); }

  function rowVals(tr){ return {ntext:tr.querySelector('[data-f=ntext]').value.trim(), ndate:tr.querySelector('[data-f=ndate]').value, due:tr.querySelector('[data-f=due]').value, owner:(tr.querySelector('[data-f=owner]')?tr.querySelector('[data-f=owner]').value:'')}; }
  function rowDirty(tr){ var r=geRows[+tr.dataset.ix]; var v=rowVals(tr); return (v.ntext!==r.oNtext)||(v.ndate!==r.oNdate)||(v.due!==r.oDue)||(v.owner!==r.oOwner); }
  function markDirty(tr){ tr.classList.toggle('dirty',rowDirty(tr)); var n=el('ge-body').querySelectorAll('tr.dirty').length; el('ge-dirty').textContent=n?(n+' izmijenjeno'):''; }
  function closeGridEdit(){ el('ge-overlay').classList.remove('open'); geRows=[]; }
  function saveGridEdit(){
    var trs=Array.prototype.slice.call(el('ge-body').querySelectorAll('tr[data-ix].dirty'));
    if(!trs.length){ banner('Nema izmjena za spremiti.'); return; }
    var btn=el('ge-save'); btn.disabled=true; var i=0,ok=0; banner('Spremam '+trs.length+' izmjena...');
    (function step(){
      if(i>=trs.length){ btn.disabled=false; banner('Spremljeno '+ok+'/'+trs.length+'.'); render(); buildOwnerFilters(); el('synced').textContent='sync '+new Date().toLocaleTimeString(); closeGridEdit(); return; }
      var tr=trs[i++]; var r=geRows[+tr.dataset.ix]; var t=r.t; var v=rowVals(tr);
      var changedNotes=(v.ntext!==r.oNtext)||(v.ndate!==r.oNdate); var changedDue=(v.due!==r.oDue); var changedOwner=(v.owner!==r.oOwner);
      var params={action:'update', taskId:t.id}; var newNdate=fromInput(v.ndate); var notes=null;
      if(changedNotes){ notes=buildNotes(v.ntext,newNdate,t.rest,t.critical,t.link); params.notes=notes; }
      if(changedDue){ params.due = v.due? toISODate(fromInput(v.due)) : ''; }
      if(changedOwner){ params.title=makeTitle(v.owner,t.title,t.isProject); }
      api(params).then(function(res){ if(res&&!res.error){ ok++;
          if(changedNotes){ t.nextText=v.ntext; t.nextDate=newNdate; t.notes=notes; }
          if(changedDue){ t.due = v.due? fromInput(v.due):null; }
          if(changedOwner){ t.prefix=v.owner; t.owner=MAP[v.owner]||v.owner; }
        } step(); }).catch(function(){ step(); });
    })();
  }

  el('a-cancel').addEventListener('click',function(){ el('addform').classList.remove('open'); });

  el('bulk-toggle').addEventListener('click',function(){ selectMode=!selectMode; document.querySelector('.wrap').classList.toggle('selecting',selectMode); this.classList.toggle('on',selectMode); this.textContent=selectMode?'Bulk ✓':'Bulk'; if(!selectMode) selected={}; render(); updateBulkBar(); });
  el('bulkbar').addEventListener('click',function(e){ var b=e.target.closest('button'); if(!b) return; if(b.dataset.bn) bulkNextRel(b.dataset.bn); else if(b.dataset.br) bulkDueRel(); });
  el('b-ntext-set').addEventListener('click',bulkNextText);
  el('b-ndate-set').addEventListener('click',bulkNextAbs);
  el('b-due-set').addEventListener('click',bulkDueAbs);
  el('b-crit-on').addEventListener('click',function(){ bulkCritical(true); });
  el('b-crit-off').addEventListener('click',function(){ bulkCritical(false); });
  el('b-clear').addEventListener('click',clearSel);

  if(getSecret()){ fillOwnerSelect(); load(); } else showSetup();
})();
</script>
