<!doctype html>
<html lang="hr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Koykan · PEP — ostatak projekta</title>
<style>
  :root{
    --bg:#0e1116; --panel:#161b22; --panel2:#1b2230; --line:#283041;
    --text:#e6edf3; --faint:#8b97a7; --dim:#5b6472; --accent:#7aa2f7;
    --good:#5ad19a; --warn:#e0af68; --bad:#ef6f6f;
    --mono:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;
    --body:system-ui,-apple-system,Segoe UI,Roboto,sans-serif;
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--text);font-family:var(--body);font-size:14px;line-height:1.45;-webkit-text-size-adjust:100%}
  a{color:var(--accent)}
  .wrap{max-width:1000px;margin:0 auto;padding:16px 14px 80px}
  /* header */
  .top{display:flex;align-items:flex-end;gap:12px;flex-wrap:wrap;margin-bottom:14px}
  .brand{font:600 12px/1 var(--mono);letter-spacing:.14em;color:var(--accent);text-transform:uppercase}
  h1{font:600 22px/1.1 var(--body);margin:4px 0 0}
  #proj-title{cursor:pointer} #proj-title:hover{text-decoration:underline dotted; text-underline-offset:3px}
  input.title-edit{font:600 22px/1.1 var(--body);background:var(--bg);border:1px solid var(--accent);color:var(--text);border-radius:8px;padding:2px 8px;min-width:220px}
  .sub{font:500 11px/1 var(--mono);color:var(--faint);letter-spacing:.04em;margin-top:5px}
  .spacer{flex:1}
  .btn{font:600 12px/1 var(--body);background:var(--panel2);color:var(--text);border:1px solid var(--line);border-radius:8px;padding:9px 13px;cursor:pointer;white-space:nowrap}
  .btn:hover{border-color:#3a445a}
  .btn.primary{background:var(--accent);color:#0b1020;border-color:var(--accent)}
  .btn.ghost{background:transparent}
  /* progress */
  .prog{margin:6px 0 16px}
  .prog .bar{height:8px;background:var(--panel2);border:1px solid var(--line);border-radius:99px;overflow:hidden}
  .prog .fill{height:100%;background:linear-gradient(90deg,var(--good),#7ee0b0);width:0;transition:width .35s ease}
  .prog .lbl{display:flex;justify-content:space-between;font:600 11px/1 var(--mono);color:var(--faint);margin-bottom:6px;letter-spacing:.04em}
  .prog .lbl b{color:var(--text)}
  /* filters */
  .filters{display:flex;flex-direction:column;gap:8px;margin-bottom:14px}
  .chips{display:flex;gap:6px;flex-wrap:wrap;align-items:center}
  .chips .klabel{font:600 10px/1 var(--mono);color:var(--dim);letter-spacing:.08em;text-transform:uppercase;margin-right:2px}
  .chip{font:600 11px/1 var(--body);background:var(--panel);border:1px solid var(--line);color:var(--faint);border-radius:99px;padding:6px 11px;cursor:pointer;user-select:none}
  .chip.on{background:var(--panel2);color:var(--text);border-color:#3a445a}
  .chip.on[data-acc=good]{color:var(--good);border-color:rgba(90,209,154,.5)}
  .chip.on[data-acc=warn]{color:var(--warn);border-color:rgba(224,175,104,.5)}
  .chip.on[data-acc=bad]{color:var(--bad);border-color:rgba(239,111,111,.5)}
  #search{flex:1;min-width:140px;background:var(--panel);border:1px solid var(--line);color:var(--text);border-radius:8px;padding:8px 11px;font-size:13px}
  /* section card */
  .sec{background:var(--panel);border:1px solid var(--line);border-radius:12px;margin-bottom:12px;overflow:hidden}
  .sec-h{display:flex;align-items:center;gap:10px;padding:11px 14px;border-bottom:1px solid var(--line);background:var(--panel2)}
  .sec-h .name{font:600 13px/1 var(--body)}
  .sec-h .count{font:600 10px/1 var(--mono);color:var(--faint);letter-spacing:.06em}
  .sec-h .done{color:var(--good)}
  /* task row — single line, ne širi se na 2 reda */
  .task{display:flex;align-items:center;gap:10px;padding:10px 14px;border-bottom:1px solid var(--line);flex-wrap:nowrap}
  .task:last-child{border-bottom:0}
  .task.is-done{opacity:.55}
  .task.is-crit{border-left:3px solid var(--bad)}
  .check{flex:none;width:20px;height:20px;border-radius:6px;border:1.5px solid var(--line);background:var(--bg);cursor:pointer;display:grid;place-items:center;color:transparent;font-size:13px}
  .task.is-done .check{background:var(--good);border-color:var(--good);color:#0b1020}
  .naziv{flex:2 1 120px;min-width:90px;cursor:text;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .task.is-done .naziv{text-decoration:line-through}
  /* inline tekstualni status (jedna linija) */
  .t-status{flex:1 1 150px;min-width:90px;background:var(--bg);border:1px solid var(--line);color:var(--text);border-radius:7px;padding:6px 8px;font-size:12px;font-family:var(--body)}
  .t-status::placeholder{color:var(--dim)}
  .ctl{display:flex;align-items:center;gap:6px;flex-wrap:nowrap;flex:none}
  select,input[type=date],input.inp{background:var(--bg);border:1px solid var(--line);color:var(--text);border-radius:7px;padding:6px 8px;font-size:12px;font-family:var(--body);color-scheme:dark}
  select.owner{min-width:104px}
  select.status[data-v=Gotovo]{color:var(--good)}
  select.status[data-v="U tijeku"]{color:var(--warn)}
  input[type=date]{font-family:var(--mono);font-size:11px;width:140px}
  input.t-due.over{border-color:var(--bad);color:var(--bad)}
  .icon{flex:none;background:transparent;border:1px solid var(--line);border-radius:7px;color:var(--faint);cursor:pointer;padding:5px 8px;font-size:12px;line-height:1}
  .icon:hover{color:var(--text);border-color:#3a445a}
  .icon.crit.on{color:var(--bad);border-color:rgba(239,111,111,.5)}
  /* add form */
  .addbar{display:flex;gap:8px;flex-wrap:wrap;align-items:center;background:var(--panel);border:1px dashed var(--line);border-radius:12px;padding:12px 14px;margin-bottom:14px}
  .addbar.hidden{display:none}
  .addbar input.inp{flex:1;min-width:180px}
  /* setup */
  .setup{max-width:440px;margin:60px auto;background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:24px}
  .setup h2{margin:0 0 6px;font-size:18px}
  .setup p{color:var(--faint);font-size:13px;margin:0 0 16px}
  .setup input{width:100%;background:var(--bg);border:1px solid var(--line);color:var(--text);border-radius:8px;padding:11px;font-size:14px;margin-bottom:12px}
  .hide{display:none!important}
  .banner{position:fixed;left:50%;bottom:18px;transform:translateX(-50%);background:var(--panel2);border:1px solid var(--line);color:var(--text);border-radius:10px;padding:10px 16px;font:600 12px/1 var(--body);box-shadow:0 8px 30px rgba(0,0,0,.4);opacity:0;pointer-events:none;transition:opacity .2s;z-index:50}
  .banner.show{opacity:1}
  .empty{padding:30px 14px;text-align:center;color:var(--faint);font-size:13px}
  @media (max-width:560px){ h1{font-size:19px} .task{flex-wrap:wrap} .naziv{min-width:100%;white-space:normal} .t-status{flex-basis:100%} .ctl{width:100%} }
</style>
</head>
<body>

<div id="setup" class="setup hide">
  <h2>PEP board</h2>
  <p>Unesi pristupni kod (dobio si ga od Doma). Pamti se na ovom uređaju.</p>
  <input id="setup-secret" type="password" placeholder="Pristupni kod" autocomplete="off">
  <button class="btn primary" id="setup-go" style="width:100%">Otvori board</button>
  <p id="setup-err" style="color:var(--bad);margin-top:10px"></p>
</div>

<div id="app" class="wrap hide">
  <div class="top">
    <div>
      <div class="brand">Koykan · PEP</div>
      <h1 id="proj-title" title="Klik za promijeniti naziv">Ostatak projekta</h1>
      <div class="sub" id="sub">učitavam…</div>
    </div>
    <div class="spacer"></div>
    <button class="btn" id="add-toggle">+ Novi task</button>
    <button class="btn ghost" id="refresh">Osvježi</button>
  </div>

  <div class="prog">
    <div class="lbl"><span>Napredak</span><span><b id="p-done">0</b> / <span id="p-total">0</span> gotovo</span></div>
    <div class="bar"><div class="fill" id="p-fill"></div></div>
  </div>

  <div class="addbar hidden" id="addbar">
    <select id="a-section"></select>
    <input class="inp" id="a-naziv" placeholder="Naziv taska">
    <select id="a-owner"></select>
    <button class="btn primary" id="a-save">Dodaj</button>
    <button class="btn ghost" id="a-cancel">Odustani</button>
  </div>

  <div class="filters">
    <div class="chips" id="f-section"></div>
    <div class="chips" id="f-owner"></div>
    <div class="chips">
      <span class="klabel">Status</span>
      <span class="chip on" data-st="all">Sve</span>
      <span class="chip" data-st="Otvoreno">Otvoreno</span>
      <span class="chip" data-st="U tijeku" data-acc="warn">U tijeku</span>
      <span class="chip" data-st="Gotovo" data-acc="good">Gotovo</span>
      <input id="search" placeholder="traži…">
    </div>
    <div class="chips">
      <span class="klabel">Rok</span>
      <span class="chip on" data-rk="all">Sve</span>
      <span class="chip" data-rk="overdue" data-acc="bad">Prekoračeno</span>
      <span class="chip" data-rk="ontime" data-acc="good">Na vrijeme</span>
      <span class="klabel" style="margin-left:10px">Hitnost</span>
      <span class="chip" id="crit-chip" data-acc="bad">Samo critical ⚑</span>
    </div>
  </div>

  <div id="board"></div>
</div>

<div class="banner" id="banner"></div>

<script>
  /* ====== CONFIG ====== */
  var ENDPOINT = 'https://script.google.com/macros/s/AKfycbx3O3N6BUCltyGV_VWpfWMqX5vv326T9wvc1g8q8u1ELomabQZvCUiTKnT6anMpxFeZ/exec';
  var SECTIONS = ['Struja','Ventilacija','Digitalija','Inventar','Ostalo'];
  var OWNERS   = ['Davor','Nino','Silva','Dom','Nataša','AnaT','Ankica','PEP tim','Neodređeno'];
  var STATUSES = ['Otvoreno','U tijeku','Gotovo'];
  /* ==================== */

  var SECRET = localStorage.getItem('pep_secret') || '';
  var TASKS = [];
  var fSection = 'all', fStatus = 'all', fOwner = {}, searchQ = '', fRok = 'all', fCrit = false;
  OWNERS.forEach(function(o){ fOwner[o] = true; });

  function el(id){ return document.getElementById(id); }
  function esc(s){ return String(s==null?'':s).replace(/[&<>"]/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c];}); }
  function escAttr(s){ return esc(s).replace(/'/g,'&#39;'); }
  function banner(m){ var b=el('banner'); b.textContent=m; b.classList.add('show'); clearTimeout(banner._t); banner._t=setTimeout(function(){b.classList.remove('show');},1800); }

  function api(params){
    if(ENDPOINT.indexOf('PASTE_')===0){ return Promise.reject('ENDPOINT nije postavljen'); }
    params.secret = SECRET;
    var qs = Object.keys(params).map(function(k){ return encodeURIComponent(k)+'='+encodeURIComponent(params[k]); }).join('&');
    return fetch(ENDPOINT+'?'+qs, {method:'GET'}).then(function(r){ return r.json(); });
  }

  /* ---------- setup ---------- */
  function showSetup(msg){ el('setup').classList.remove('hide'); el('app').classList.add('hide'); if(msg) el('setup-err').textContent=msg; }
  el('setup-go').addEventListener('click', function(){
    var v = el('setup-secret').value.trim(); if(!v){ el('setup-err').textContent='Unesi kod.'; return; }
    SECRET = v; el('setup-err').textContent='Provjeravam…';
    api({action:'list'}).then(function(res){
      if(res && res.error==='auth'){ el('setup-err').textContent='Pogrešan kod.'; return; }
      if(res && res.ok){ localStorage.setItem('pep_secret', SECRET); el('setup').classList.add('hide'); el('app').classList.remove('hide'); setTasks(res.tasks||[]); renderAll(); }
      else { el('setup-err').textContent='Greška: '+((res&&res.error)||'?'); }
    }).catch(function(e){ el('setup-err').textContent='Greška veze: '+e; });
  });
  el('setup-secret').addEventListener('keydown', function(e){ if(e.key==='Enter') el('setup-go').click(); });

  /* ---------- load ---------- */
  function load(){
    el('sub').textContent='učitavam…';
    api({action:'list'}).then(function(res){
      if(res && res.error==='auth'){ showSetup('Kod više ne vrijedi, unesi ponovno.'); return; }
      if(res && res.ok){ setTasks(res.tasks||[]); renderAll(); banner('Osvježeno'); }
      else { banner('Greška: '+((res&&res.error)||'?')); }
    }).catch(function(e){ banner('Greška veze: '+e); });
  }
  el('refresh').addEventListener('click', load);

  /* ---------- naziv projekta (sprema se kao skrivena stavka u Sheetu) ---------- */
  var DEFAULT_TITLE='Ostatak projekta'; var boardTitle=DEFAULT_TITLE; var metaId=null;
  function setTasks(arr){
    var meta=arr.filter(function(t){return t.section==='__meta';})[0];
    metaId = meta ? meta.id : null;
    boardTitle = (meta && meta.naziv) ? meta.naziv : DEFAULT_TITLE;
    TASKS = arr.filter(function(t){return t.section!=='__meta';});
    applyTitle();
  }
  function applyTitle(){ var e0=el('proj-title'); if(e0) e0.textContent=boardTitle; document.title='Koykan · PEP — '+boardTitle; }
  function editTitle(){
    var h=el('proj-title'); if(!h) return; var cur=boardTitle;
    var inp=document.createElement('input'); inp.className='title-edit'; inp.value=cur;
    h.replaceWith(inp); inp.focus(); inp.select();
    function finish(commit){
      var v=inp.value.trim();
      var nh=document.createElement('h1'); nh.id='proj-title'; nh.title='Klik za promijeniti naziv';
      inp.replaceWith(nh); nh.addEventListener('click', editTitle);
      if(commit && v && v!==cur){ saveTitle(v); } else { applyTitle(); }
    }
    inp.addEventListener('blur', function(){ finish(true); });
    inp.addEventListener('keydown', function(e){ if(e.key==='Enter'){ inp.blur(); } if(e.key==='Escape'){ finish(false); } });
  }
  function saveTitle(name){
    boardTitle=name; applyTitle();
    if(metaId){
      api({action:'update', id:metaId, naziv:name}).then(function(res){ if(!res||res.error){ banner('Naziv nije spremljen'); load(); } else banner('Naziv spremljen'); }).catch(function(){ load(); });
    } else {
      api({action:'add', section:'__meta', naziv:name, status:'Otvoreno'}).then(function(res){ if(res&&res.ok){ if(res.id) metaId=res.id; banner('Naziv spremljen'); } else { banner('Naziv nije spremljen'); } }).catch(function(){});
    }
  }

  /* ---------- filters ---------- */
  function buildSectionFilter(){
    var c = el('f-section'); c.innerHTML='<span class="klabel">Sekcija</span>';
    var all = mk('Sve','all', fSection==='all'); c.appendChild(all);
    SECTIONS.forEach(function(s){ c.appendChild(mk(s, s, fSection===s)); });
    function mk(label,val,on){ var sp=document.createElement('span'); sp.className='chip'+(on?' on':''); sp.textContent=label; sp.addEventListener('click',function(){ fSection=val; renderAll(); }); return sp; }
  }
  function buildOwnerFilter(){
    var c = el('f-owner'); c.innerHTML='<span class="klabel">Nositelj</span>';
    OWNERS.forEach(function(o){ var sp=document.createElement('span'); sp.className='chip'+(fOwner[o]?' on':''); sp.textContent=o; sp.addEventListener('click',function(){ fOwner[o]=!fOwner[o]; renderAll(); }); c.appendChild(sp); });
  }
  Array.prototype.forEach.call(document.querySelectorAll('[data-st]'), function(ch){
    ch.addEventListener('click', function(){ fStatus=ch.getAttribute('data-st'); Array.prototype.forEach.call(document.querySelectorAll('[data-st]'),function(x){x.classList.toggle('on',x===ch);}); renderAll(); });
  });
  Array.prototype.forEach.call(document.querySelectorAll('[data-rk]'), function(ch){
    ch.addEventListener('click', function(){ fRok=ch.getAttribute('data-rk'); Array.prototype.forEach.call(document.querySelectorAll('[data-rk]'),function(x){x.classList.toggle('on',x===ch);}); renderAll(); });
  });
  el('crit-chip').addEventListener('click', function(){ fCrit=!fCrit; this.classList.toggle('on',fCrit); renderAll(); });
  el('search').addEventListener('input', function(){ searchQ=this.value.toLowerCase().trim(); renderAll(); });

  function todayStr(){ var d=new Date(); var m=('0'+(d.getMonth()+1)).slice(-2), da=('0'+d.getDate()).slice(-2); return d.getFullYear()+'-'+m+'-'+da; }
  function isOverdue(t){ return !!t.due && t.status!=='Gotovo' && t.due < todayStr(); }
  function isOnTime(t){ return !!t.due && t.status!=='Gotovo' && t.due >= todayStr(); }

  function visible(){
    return TASKS.filter(function(t){
      if(fSection!=='all' && t.section!==fSection) return false;
      if(fStatus!=='all' && t.status!==fStatus) return false;
      var ow = OWNERS.indexOf(t.owner)>=0 ? t.owner : 'Neodređeno';
      if(fOwner[ow]===false) return false;
      if(fCrit && !t.critical) return false;
      if(fRok==='overdue' && !isOverdue(t)) return false;
      if(fRok==='ontime' && !isOnTime(t)) return false;
      if(searchQ && String(t.naziv||'').toLowerCase().indexOf(searchQ)<0) return false;
      return true;
    });
  }

  /* ---------- render ---------- */
  function renderAll(){ buildSectionFilter(); buildOwnerFilter(); renderProgress(); renderBoard(); }

  function renderProgress(){
    var done = TASKS.filter(function(t){return t.status==='Gotovo';}).length, tot = TASKS.length;
    el('p-done').textContent=done; el('p-total').textContent=tot;
    el('p-fill').style.width = tot? Math.round(done/tot*100)+'%' : '0%';
    var crit = TASKS.filter(function(t){return t.critical && t.status!=='Gotovo';}).length;
    var od = TASKS.filter(isOverdue).length;
    el('sub').textContent = tot+' taskova · '+done+' gotovo'+(crit?(' · '+crit+' critical'):'')+(od?(' · '+od+' prekoračeno'):'');
  }

  function renderBoard(){
    var board = el('board'); board.innerHTML='';
    var items = visible();
    if(!items.length){ board.innerHTML='<div class="empty">Nema taskova za prikaz. Provjeri filtere ili dodaj novi.</div>'; return; }
    var order = SECTIONS.slice();
    items.forEach(function(t){ if(order.indexOf(t.section)<0) order.push(t.section); });
    order.forEach(function(sec){
      var arr = items.filter(function(t){return t.section===sec;});
      if(!arr.length) return;
      arr.sort(function(a,b){ if((a.status==='Gotovo')!==(b.status==='Gotovo')) return a.status==='Gotovo'?1:-1; if(a.critical!==b.critical) return a.critical?-1:1; return 0; });
      var card=document.createElement('div'); card.className='sec';
      var doneN=arr.filter(function(t){return t.status==='Gotovo';}).length;
      card.innerHTML='<div class="sec-h"><span class="name">'+esc(sec)+'</span><span class="count"><span class="done">'+doneN+'</span> / '+arr.length+'</span></div>';
      arr.forEach(function(t){ card.appendChild(taskRow(t)); });
      board.appendChild(card);
    });
  }

  function taskRow(t){
    var done = t.status==='Gotovo';
    var row=document.createElement('div'); row.className='task'+(done?' is-done':'')+(t.critical?' is-crit':'');
    row.innerHTML =
      '<div class="check" title="Označi gotovo">'+(done?'✓':'')+'</div>'+
      '<div class="naziv" title="Klik za uredi naziv">'+esc(t.naziv)+'</div>'+
      '<input class="t-status" placeholder="status…" value="'+escAttr(t.note||'')+'" title="Tekstualni status">'+
      '<div class="ctl">'+
        ownerSelect(t)+
        statusSelect(t)+
        '<input type="date" class="t-due'+(isOverdue(t)?' over':'')+'" value="'+escAttr(t.due||'')+'">'+
        '<button class="icon crit'+(t.critical?' on':'')+'" title="Critical">⚑</button>'+
        '<button class="icon del" title="Obriši">✕</button>'+
      '</div>';

    row.querySelector('.check').addEventListener('click', function(){ update(t, {status: done?'Otvoreno':'Gotovo'}); });
    row.querySelector('.naziv').addEventListener('click', function(){ editNaziv(t, row); });
    var st=row.querySelector('.t-status');
    st.addEventListener('change', function(){ if(this.value.trim()!==String(t.note||'')) update(t, {note:this.value.trim()}); });
    st.addEventListener('keydown', function(e){ if(e.key==='Enter'){ this.blur(); } });
    row.querySelector('.owner').addEventListener('change', function(){ update(t, {owner:this.value}); });
    var ss=row.querySelector('.status'); ss.addEventListener('change', function(){ update(t, {status:this.value}); });
    row.querySelector('.t-due').addEventListener('change', function(){ update(t, {due:this.value}); });
    row.querySelector('.crit').addEventListener('click', function(){ update(t, {critical: t.critical?'false':'true'}); });
    row.querySelector('.del').addEventListener('click', function(){ if(confirm('Obrisati task "'+t.naziv+'"?')) del(t); });
    return row;
  }

  function ownerSelect(t){
    var cur = OWNERS.indexOf(t.owner)>=0 ? t.owner : (t.owner||'Neodređeno');
    var opts = OWNERS.slice(); if(opts.indexOf(cur)<0) opts.unshift(cur);
    return '<select class="owner">'+opts.map(function(o){return '<option'+(o===cur?' selected':'')+'>'+esc(o)+'</option>';}).join('')+'</select>';
  }
  function statusSelect(t){
    return '<select class="status" data-v="'+escAttr(t.status)+'">'+STATUSES.map(function(s){return '<option'+(s===t.status?' selected':'')+'>'+esc(s)+'</option>';}).join('')+'</select>';
  }

  function editNaziv(t, row){
    var cell=row.querySelector('.naziv');
    var inp=document.createElement('input'); inp.className='inp'; inp.value=t.naziv; inp.style.flex='2';
    cell.replaceWith(inp); inp.focus(); inp.select();
    function commit(){ var v=inp.value.trim(); if(v && v!==t.naziv){ update(t,{naziv:v}); } else { renderBoard(); } }
    inp.addEventListener('blur', commit);
    inp.addEventListener('keydown', function(e){ if(e.key==='Enter'){ inp.blur(); } if(e.key==='Escape'){ renderBoard(); } });
  }

  /* ---------- mutations (optimistic) ---------- */
  function applyLocal(t, fields){
    Object.keys(fields).forEach(function(k){
      if(k==='critical') t.critical = (fields[k]==='true');
      else t[k]=fields[k];
    });
  }
  function update(t, fields){
    applyLocal(t, fields); renderAll();
    var p={action:'update', id:t.id}; Object.keys(fields).forEach(function(k){ p[k]=fields[k]; });
    api(p).then(function(res){ if(!res||res.error){ banner('Nije spremljeno: '+((res&&res.error)||'?')); load(); } }).catch(function(e){ banner('Greška: '+e); load(); });
  }
  function del(t){
    TASKS = TASKS.filter(function(x){return x.id!==t.id;}); renderAll();
    api({action:'delete', id:t.id}).then(function(res){ if(!res||res.error){ banner('Brisanje nije uspjelo'); load(); } else banner('Obrisano'); }).catch(function(){ load(); });
  }

  /* ---------- add ---------- */
  el('add-toggle').addEventListener('click', function(){ el('addbar').classList.toggle('hidden'); if(!el('addbar').classList.contains('hidden')) el('a-naziv').focus(); });
  el('a-cancel').addEventListener('click', function(){ el('addbar').classList.add('hidden'); el('a-naziv').value=''; });
  el('a-save').addEventListener('click', function(){
    var naziv=el('a-naziv').value.trim(); if(!naziv){ el('a-naziv').focus(); return; }
    var section=el('a-section').value, owner=el('a-owner').value;
    var tmp={id:'tmp'+Date.now(), section:section, naziv:naziv, owner:owner, status:'Otvoreno', due:'', note:'', critical:false};
    TASKS.push(tmp); renderAll(); el('a-naziv').value='';
    api({action:'add', section:section, naziv:naziv, owner:owner, status:'Otvoreno'}).then(function(res){
      if(res&&res.ok){ banner('Dodano'); load(); } else { banner('Dodavanje nije uspjelo'); load(); }
    }).catch(function(){ load(); });
  });

  function fillAddSelects(){
    el('a-section').innerHTML = SECTIONS.map(function(s){return '<option>'+esc(s)+'</option>';}).join('');
    el('a-owner').innerHTML = OWNERS.map(function(o){return '<option'+(o==='Davor'?' selected':'')+'>'+esc(o)+'</option>';}).join('');
  }

  /* ---------- boot ---------- */
  fillAddSelects();
  el('proj-title').addEventListener('click', editTitle);
  if(ENDPOINT.indexOf('PASTE_')===0){
    el('setup').classList.remove('hide');
    el('setup-err').textContent='Postavi ENDPOINT u kodu (Apps Script /exec URL) pa osvježi.';
  } else if(!SECRET){
    showSetup();
  } else {
    el('app').classList.remove('hide'); load();
  }
</script>
</body>
</html>
